<html lang="pt-BR">

<meta charset="UTF-8">

<title>Disputa de Selecoes - Copa 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#0a7c4e;--gl:#e8f5ef;--gm:#1d9e75;--bg:#f7f6f2;--card:#fff;--border:#e2e0d8;--text:#1a1a18;--muted:#6b6b65}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--green);color:#fff;padding:1.5rem 1rem 1.2rem;text-align:center}
.ey{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#9ee5c5;margin-bottom:.4rem}
h1{font-size:1.8rem;font-weight:900;line-height:1.1}
header p{margin-top:.5rem;font-size:14px;color:#b8e8d4}
.sel{display:flex;align-items:center;justify-content:center;gap:.8rem;padding:1.2rem 1rem;flex-wrap:wrap}
.sg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;max-width:220px}
.sg label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
select{font-family:inherit;font-size:14px;font-weight:500;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);width:100%}
.vs{font-size:13px;font-weight:700;color:var(--muted);padding-top:18px}
.sb{display:flex;align-items:center;justify-content:center;gap:1rem;padding:.8rem 1rem;background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-wrap:wrap}
.sb-blk{display:flex;flex-direction:column;align-items:center;min-width:80px}
.sb-nation{font-size:11px;font-weight:600;color:var(--muted);text-align:center}
.sb-num{font-size:2.8rem;font-weight:900;line-height:1;color:var(--text)}
.sb-num.win{color:var(--green)}
.vrd{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:center;padding:5px 12px;border-radius:999px;background:var(--bg);border:1px solid var(--border)}
.vrd.ok{background:var(--gl);color:var(--green);border-color:#9ee5c5}
.rst{display:block;margin:.4rem auto 0;font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--border);border-radius:8px;padding:5px 14px;cursor:pointer}
.pb-wrap{max-width:820px;margin:.6rem auto 0;padding:0 1rem .4rem}
.pb-lbl{font-size:11px;color:var(--muted);margin-bottom:3px}
.pb{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;background:var(--gm);border-radius:99px;transition:width .3s}
.pos-list{max-width:820px;margin:0 auto;padding:.8rem 1rem 2rem;display:flex;flex-direction:column;gap:8px}
.ph{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:0 4px;margin-top:.5rem;margin-bottom:1px}
.row{background:var(--card);border:1.5px solid var(--border);border-radius:12px;display:grid;grid-template-columns:1fr 40px 1fr;align-items:stretch;overflow:hidden}
.row.voted{border-color:var(--gm)}
.pb-btn{font-family:inherit;font-size:13px;font-weight:500;color:var(--text);background:none;border:none;cursor:pointer;padding:11px 12px;text-align:left;line-height:1.4;width:100%}
.pb-btn.r{text-align:right}
.cl{font-size:11px;color:var(--muted);display:block;margin-top:1px;font-weight:400}
.pb-btn.win{color:var(--green);font-weight:700;background:var(--gl)}
.pb-btn.lose{color:#b0b0a8}
.mid{display:flex;align-items:center;justify-content:center;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.pt{font-size:8px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap}
.trophy{text-align:center;padding:1.5rem 1rem;display:none}
.trophy.show{display:block}
.ti{font-size:2.5rem;margin-bottom:.3rem}
.tt{font-size:1.4rem;font-weight:900;color:#c8962a}
.ts{font-size:13px;color:var(--muted);margin-top:.3rem}
</style>
</head>

var posOrder = ["Goleiro","Lateral-Direito","Lateral-Esquerdo","Zagueiro","Volante","Meia","Atacante"];
var votes = {};

function nation(key){ return key + (S[key] ? ' (' + S[key].f + ')' : ''); }

function buildSelects() {
  var keys = Object.keys(S);
  var s1 = document.getElementById('s1');
  var s2 = document.getElementById('s2');
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var o1 = document.createElement('option'); o1.value = k; o1.textContent = k + ' (' + S[k].f + ')'; s1.appendChild(o1);
    var o2 = document.createElement('option'); o2.value = k; o2.textContent = k + ' (' + S[k].f + ')'; s2.appendChild(o2);
  }
  s1.value = 'Brasil';
  s2.value = 'Argentina';
  s1.addEventListener('change', function(){ votes={}; render(); });
  s2.addEventListener('change', function(){ votes={}; render(); });
}

function vote(key, side) { votes[key] = side; render(); }
function resetVotes() { votes = {}; render(); }

function render() {
  var na = document.getElementById('s1').value;
  var nb = document.getElementById('s2').value;
  var sa = S[na]; var sb = S[nb];
  document.getElementById('na').textContent = na + ' (' + sa.f + ')';
  document.getElementById('nb').textContent = nb + ' (' + sb.f + ')';

  var scoreA = 0; var scoreB = 0; var total = 0;
  var container = document.getElementById('pos');
  container.innerHTML = '';

  for (var pi = 0; pi < posOrder.length; pi++) {
    var pos = posOrder[pi];
    var pa = sa[pos] || [];
    var pb = sb[pos] || [];
    if (pa.length === 0 && pb.length === 0) continue;

    var hdr = document.createElement('div');
    hdr.className = 'ph';
    hdr.textContent = pos;
    container.appendChild(hdr);

    var maxLen = pa.length > pb.length ? pa.length : pb.length;
    for (var i = 0; i < maxLen; i++) {
      var key = pos + '_' + i;
      var playerA = pa[i] || null;
      var playerB = pb[i] || null;
      if (!playerA && !playerB) continue;
      total++;
      var voted = votes[key] || null;
      if (voted === 'a') scoreA++;
      if (voted === 'b') scoreB++;

      var row = document.createElement('div');
      row.className = voted ? 'row voted' : 'row';

      var btnA = document.createElement('button');
      btnA.className = 'pb-btn' + (voted === 'a' ? ' win' : voted === 'b' ? ' lose' : '');
      if (playerA) {
        btnA.innerHTML = playerA[0] + (playerA[1] ? '<span class="cl">' + playerA[1] + '</span>' : '');
        (function(k){ btnA.addEventListener('click', function(){ vote(k,'a'); }); })(key);
      } else {
        btnA.innerHTML = '-';
        btnA.disabled = true;
        btnA.style.color = 'var(--muted)';
      }

      var mid = document.createElement('div');
      mid.className = 'mid';
      var ptag = document.createElement('span');
      ptag.className = 'pt';
      ptag.textContent = i === 0 ? pos.substring(0,3).toUpperCase() : (i+1)+'o';
      mid.appendChild(ptag);

      var btnB = document.createElement('button');
      btnB.className = 'pb-btn r' + (voted === 'b' ? ' win' : voted === 'a' ? ' lose' : '');
      if (playerB) {
        btnB.innerHTML = playerB[0] + (playerB[1] ? '<span class="cl">' + playerB[1] + '</span>' : '');
        (function(k){ btnB.addEventListener('click', function(){ vote(k,'b'); }); })(key);
      } else {
        btnB.innerHTML = '-';
        btnB.disabled = true;
        btnB.style.color = 'var(--muted)';
      }

      row.appendChild(btnA);
      row.appendChild(mid);
      row.appendChild(btnB);
      container.appendChild(row);
    }
  }

  var elA = document.getElementById('sa');
  var elB = document.getElementById('sb2');
  elA.textContent = scoreA;
  elB.textContent = scoreB;
  elA.className = scoreA > scoreB ? 'sb-num win' : 'sb-num';
  elB.className = scoreB > scoreA ? 'sb-num win' : 'sb-num';

  var votedCount = Object.keys(votes).length;
  var pct = total > 0 ? Math.round(votedCount / total * 100) : 0;
  document.getElementById('pbl').textContent = votedCount + ' de ' + total + ' votados';
  document.getElementById('pbf').style.width = pct + '%';

  var vrdEl = document.getElementById('vrd');
  var trophy = document.getElementById('trophy');

  if (votedCount === 0) {
    vrdEl.textContent = 'Aguardando votos';
    vrdEl.className = 'vrd';
    trophy.className = 'trophy';
  } else if (votedCount < total) {
    vrdEl.textContent = pct + '% votado';
    vrdEl.className = 'vrd';
    trophy.className = 'trophy';
  } else {
    var winner = scoreA > scoreB ? na : scoreB > scoreA ? nb : null;
    if (winner) {
      vrdEl.textContent = winner + ' vence!';
      vrdEl.className = 'vrd ok';
      document.getElementById('tt').textContent = winner + ' vence no papel!';
    } else {
      vrdEl.textContent = 'Empate!';
      vrdEl.className = 'vrd ok';
      document.getElementById('tt').textContent = 'Empate tecnico!';
    }
    document.getElementById('ts').textContent = 'Placar: ' + na + ' ' + scoreA + ' x ' + scoreB + ' ' + nb;
    trophy.className = 'trophy show';
  }
}

buildSelects();
render();
</script>
