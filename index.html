<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disputa de Selecoes - Copa 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#0a7c4e;--gl:#e8f5ef;--gm:#1d9e75;--bg:#f7f6f2;--card:#fff;--border:#e2e0d8;--text:#1a1a18;--muted:#6b6b65;--red:#c0392b;--rl:#fdecea}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--green);color:#fff;padding:1.4rem 1rem 1rem;text-align:center}
.ey{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#9ee5c5;margin-bottom:.3rem}
h1{font-size:1.7rem;font-weight:900;line-height:1.1}
header p{margin-top:.4rem;font-size:13px;color:#b8e8d4}
.sel{display:flex;align-items:center;justify-content:center;gap:.8rem;padding:1rem;flex-wrap:wrap}
.sg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;max-width:220px}
.sg label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
select{font-family:inherit;font-size:14px;font-weight:500;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);width:100%}
.vs{font-size:13px;font-weight:700;color:var(--muted);padding-top:18px}
/* scoreboard */
.sb{display:flex;align-items:center;justify-content:center;gap:.8rem;padding:.8rem 1rem;background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-wrap:wrap}
.sb-blk{display:flex;flex-direction:column;align-items:center;min-width:90px}
.sb-nation{font-size:11px;font-weight:600;color:var(--muted);text-align:center;max-width:90px}
.sb-num{font-size:2.8rem;font-weight:900;line-height:1;color:var(--text)}
.sb-num.win{color:var(--green)}
.sb-mid{display:flex;flex-direction:column;align-items:center;gap:6px}
.vrd{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:center;padding:5px 12px;border-radius:999px;background:var(--bg);border:1px solid var(--border);white-space:nowrap}
.vrd.ok{background:var(--gl);color:var(--green);border-color:#9ee5c5}
.vrd.draw{background:#fff8e1;color:#b07800;border-color:#ffe082}
.rst{font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--border);border-radius:8px;padding:5px 14px;cursor:pointer}
/* progress */
.pb-wrap{max-width:860px;margin:.5rem auto 0;padding:0 1rem .3rem}
.pb-lbl{font-size:11px;color:var(--muted);margin-bottom:3px}
.pb{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;background:var(--gm);border-radius:99px;transition:width .3s}
/* position list */
.pos-list{max-width:860px;margin:0 auto;padding:.6rem 1rem 2rem;display:flex;flex-direction:column;gap:6px}
.ph-wrap{display:flex;align-items:center;gap:8px;margin-top:.6rem;margin-bottom:2px}
.ph{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.ph-score{font-size:10px;font-weight:700;color:var(--muted);margin-left:auto;background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:2px 8px}
/* match row */
.row{background:var(--card);border:1.5px solid var(--border);border-radius:12px;display:grid;grid-template-columns:1fr 52px 1fr;align-items:stretch;overflow:hidden;position:relative}
.row.voted-a{border-color:var(--gm)}
.row.voted-b{border-color:var(--gm)}
/* player buttons */
.pb-btn{font-family:inherit;font-size:13px;font-weight:500;color:var(--text);background:none;border:none;cursor:pointer;padding:11px 12px;text-align:left;line-height:1.4;width:100%;transition:background .12s}
.pb-btn.r{text-align:right}
.cl{font-size:11px;color:var(--muted);display:block;margin-top:1px;font-weight:400}
.pb-btn.win{color:var(--green);font-weight:700;background:var(--gl)}
.pb-btn.lose{color:#b0b0a8;background:#fafaf8}
.pb-btn:active{opacity:.7}
/* middle column */
.mid{display:flex;flex-direction:column;align-items:center;justify-content:center;border-left:1px solid var(--border);border-right:1px solid var(--border);gap:4px;padding:4px 0}
.pt{font-size:8px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap}
/* swap button */
.swap-btn{background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:3px 5px;font-size:10px;color:var(--muted);line-height:1;display:flex;align-items:center;justify-content:center}
.swap-btn:active{background:var(--bg)}
/* move buttons */
.move-col{display:flex;flex-direction:column;gap:2px}
.mv{background:none;border:none;cursor:pointer;font-size:11px;color:#ccc;padding:1px 3px;line-height:1}
.mv:active{color:var(--muted)}
/* trophy */
.trophy{text-align:center;padding:1.5rem 1rem;display:none;border-top:1px solid var(--border);margin-top:.5rem}
.trophy.show{display:block}
.tt{font-size:1.3rem;font-weight:900;color:#c8962a;margin-bottom:.3rem}
.ts{font-size:13px;color:var(--muted)}
/* tip */
.tip{font-size:11px;color:var(--muted);text-align:center;padding:.4rem 1rem;font-style:italic}
</style>
</head>

var posOrder = ["Goleiro","Lateral-Direito","Lateral-Esquerdo","Zagueiro","Volante","Meia","Atacante"];

// State: per-position player order for each team, and votes
var orderA = {};
var orderB = {};
var votes = {};

function deepCopy(arr) {
  var r = [];
  for (var i = 0; i < arr.length; i++) r.push([arr[i][0], arr[i][1]]);
  return r;
}

function initOrders(na, nb) {
  orderA = {}; orderB = {};
  var sa = BASE[na]; var sb = BASE[nb];
  for (var p = 0; p < posOrder.length; p++) {
    var pos = posOrder[p];
    orderA[pos] = sa[pos] ? deepCopy(sa[pos]) : [];
    orderB[pos] = sb[pos] ? deepCopy(sb[pos]) : [];
  }
}

function buildSelects() {
  var keys = Object.keys(BASE);
  var s1 = document.getElementById('s1');
  var s2 = document.getElementById('s2');
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var o1 = document.createElement('option'); o1.value = k; o1.textContent = k + ' (' + BASE[k].f + ')'; s1.appendChild(o1);
    var o2 = document.createElement('option'); o2.value = k; o2.textContent = k + ' (' + BASE[k].f + ')'; s2.appendChild(o2);
  }
  s1.value = 'Brasil'; s2.value = 'Argentina';
  s1.addEventListener('change', function(){ reset(); });
  s2.addEventListener('change', function(){ reset(); });
}

function reset() {
  votes = {};
  var na = document.getElementById('s1').value;
  var nb = document.getElementById('s2').value;
  initOrders(na, nb);
  render();
}

function resetVotes() { votes = {}; render(); }

function vote(key, side) {
  if (votes[key] === side) {
    delete votes[key]; // deselect
  } else {
    votes[key] = side;
  }
  render();
}

function movePlayer(pos, side, idx, dir) {
  var arr = side === 'a' ? orderA[pos] : orderB[pos];
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= arr.length) return;
  var tmp = arr[idx]; arr[idx] = arr[newIdx]; arr[newIdx] = tmp;
  // clear vote for affected slots
  var key1 = pos + '_' + idx;
  var key2 = pos + '_' + newIdx;
  delete votes[key1];
  delete votes[key2];
  render();
}

function render() {
  var na = document.getElementById('s1').value;
  var nb = document.getElementById('s2').value;
  document.getElementById('na').textContent = na + ' (' + BASE[na].f + ')';
  document.getElementById('nb').textContent = nb + ' (' + BASE[nb].f + ')';

  var scoreA = 0; var scoreB = 0; var total = 0;
  var container = document.getElementById('pos');
  container.innerHTML = '';

  for (var pi = 0; pi < posOrder.length; pi++) {
    var pos = posOrder[pi];
    var pa = orderA[pos] || [];
    var pb = orderB[pos] || [];
    if (pa.length === 0 && pb.length === 0) continue;

    var posA = 0; var posB = 0;
    var maxLen = pa.length > pb.length ? pa.length : pb.length;
    for (var i = 0; i < maxLen; i++) {
      var v = votes[pos + '_' + i];
      if (v === 'a') posA++;
      if (v === 'b') posB++;
    }

    var phWrap = document.createElement('div');
    phWrap.className = 'ph-wrap';
    var phEl = document.createElement('div');
    phEl.className = 'ph';
    phEl.textContent = pos;
    phWrap.appendChild(phEl);
    if (posA > 0 || posB > 0) {
      var phScore = document.createElement('div');
      phScore.className = 'ph-score';
      phScore.textContent = posA + ' x ' + posB;
      phScore.style.color = posA > posB ? 'var(--green)' : posB > posA ? 'var(--red)' : 'var(--muted)';
      phWrap.appendChild(phScore);
    }
    container.appendChild(phWrap);

    for (var i = 0; i < maxLen; i++) {
      var key = pos + '_' + i;
      var playerA = pa[i] || null;
      var playerB = pb[i] || null;
      if (!playerA && !playerB) continue;
      total++;
      var voted = votes[key] || null;
      if (voted === 'a') scoreA++;
      if (voted === 'b') scoreB++;

      var row = document.createElement('div');
      row.className = 'row' + (voted ? ' voted-' + voted : '');

      // --- Side A ---
      var colA = document.createElement('div');
      colA.style.display = 'flex';
      colA.style.alignItems = 'stretch';

      var btnA = document.createElement('button');
      btnA.className = 'pb-btn' + (voted === 'a' ? ' win' : voted === 'b' ? ' lose' : '');
      if (playerA) {
        btnA.innerHTML = playerA[0] + (playerA[1] ? '<span class="cl">' + playerA[1] + '</span>' : '');
        (function(k){ btnA.addEventListener('click', function(){ vote(k,'a'); }); })(key);
      } else {
        btnA.innerHTML = '<span style="color:var(--muted)">-</span>';
        btnA.disabled = true;
      }

      // move arrows for A
      var mvColA = document.createElement('div');
      mvColA.className = 'move-col';
      mvColA.style.display = 'flex';
      mvColA.style.flexDirection = 'column';
      mvColA.style.justifyContent = 'center';
      mvColA.style.padding = '0 4px 0 0';
      if (playerA && pa.length > 1) {
        if (i > 0) {
          var upA = document.createElement('button');
          upA.className = 'mv'; upA.textContent = 'v';
          upA.style.transform = 'rotate(180deg)';
          (function(p,ix){ upA.addEventListener('click', function(e){ e.stopPropagation(); movePlayer(p,'a',ix,-1); }); })(pos,i);
          mvColA.appendChild(upA);
        }
        if (i < pa.length - 1) {
          var dnA = document.createElement('button');
          dnA.className = 'mv'; dnA.textContent = 'v';
          (function(p,ix){ dnA.addEventListener('click', function(e){ e.stopPropagation(); movePlayer(p,'a',ix,1); }); })(pos,i);
          mvColA.appendChild(dnA);
        }
      }
      colA.appendChild(btnA);
      colA.appendChild(mvColA);

      // --- Middle ---
      var mid = document.createElement('div');
      mid.className = 'mid';
      var ptag = document.createElement('span');
      ptag.className = 'pt';
      ptag.textContent = i === 0 ? pos.substring(0,3).toUpperCase() : (i+1) + 'o';
      mid.appendChild(ptag);

      // --- Side B ---
      var colB = document.createElement('div');
      colB.style.display = 'flex';
      colB.style.alignItems = 'stretch';

      // move arrows for B
      var mvColB = document.createElement('div');
      mvColB.className = 'move-col';
      mvColB.style.display = 'flex';
      mvColB.style.flexDirection = 'column';
      mvColB.style.justifyContent = 'center';
      mvColB.style.padding = '0 0 0 4px';
      if (playerB && pb.length > 1) {
        if (i > 0) {
          var upB = document.createElement('button');
          upB.className = 'mv'; upB.textContent = 'v';
          upB.style.transform = 'rotate(180deg)';
          (function(p,ix){ upB.addEventListener('click', function(e){ e.stopPropagation(); movePlayer(p,'b',ix,-1); }); })(pos,i);
          mvColB.appendChild(upB);
        }
        if (i < pb.length - 1) {
          var dnB = document.createElement('button');
          dnB.className = 'mv'; dnB.textContent = 'v';
          (function(p,ix){ dnB.addEventListener('click', function(e){ e.stopPropagation(); movePlayer(p,'b',ix,1); }); })(pos,i);
          mvColB.appendChild(dnB);
        }
      }

      var btnB = document.createElement('button');
      btnB.className = 'pb-btn r' + (voted === 'b' ? ' win' : voted === 'a' ? ' lose' : '');
      if (playerB) {
        btnB.innerHTML = playerB[0] + (playerB[1] ? '<span class="cl">' + playerB[1] + '</span>' : '');
        (function(k){ btnB.addEventListener('click', function(){ vote(k,'b'); }); })(key);
      } else {
        btnB.innerHTML = '<span style="color:var(--muted)">-</span>';
        btnB.disabled = true;
      }
      colB.appendChild(mvColB);
      colB.appendChild(btnB);

      row.appendChild(colA);
      row.appendChild(mid);
      row.appendChild(colB);
      container.appendChild(row);
    }
  }

  // Scoreboard
  var elA = document.getElementById('sa');
  var elB = document.getElementById('sb2');
  elA.textContent = scoreA;
  elB.textContent = scoreB;
  elA.className = scoreA > scoreB ? 'sb-num win' : 'sb-num';
  elB.className = scoreB > scoreA ? 'sb-num win' : 'sb-num';

  var votedCount = Object.keys(votes).length;
  var pct = total > 0 ? Math.round(votedCount / total * 100) : 0;
  document.getElementById('pbl').textContent = votedCount + ' de ' + total + ' votados (' + pct + '%)';
  document.getElementById('pbf').style.width = pct + '%';

  var vrdEl = document.getElementById('vrd');
  var trophy = document.getElementById('trophy');

  if (votedCount === 0) {
    vrdEl.textContent = 'Aguardando votos';
    vrdEl.className = 'vrd';
    trophy.className = 'trophy';
  } else if (votedCount < total) {
    var lead = scoreA > scoreB ? na + ' lidera' : scoreB > scoreA ? nb + ' lidera' : 'Empatado';
    vrdEl.textContent = lead + ' ' + scoreA + ' x ' + scoreB;
    vrdEl.className = scoreA !== scoreB ? 'vrd ok' : 'vrd draw';
    trophy.className = 'trophy';
  } else {
    var winner = scoreA > scoreB ? na : scoreB > scoreA ? nb : null;
    if (winner) {
      vrdEl.textContent = winner + ' vence ' + scoreA + ' x ' + scoreB;
      vrdEl.className = 'vrd ok';
      document.getElementById('tt').textContent = winner + ' (' + BASE[winner].f + ') vence no papel!';
    } else {
      vrdEl.textContent = 'Empate ' + scoreA + ' x ' + scoreB;
      vrdEl.className = 'vrd draw';
      document.getElementById('tt').textContent = 'Empate tecnico!';
    }
    document.getElementById('ts').textContent = 'Placar final: ' + na + ' ' + scoreA + ' x ' + scoreB + ' ' + nb;
    trophy.className = 'trophy show';
  }
}

buildSelects();
reset();
</script>
</body>
</html>
